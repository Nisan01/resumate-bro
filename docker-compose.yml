services:
  app-dev:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules

  app-prod:
    build:
      context: .
      target: production
    image: resumate-bro:1.0
    ports:
      - "3000:3000"
    env_file:
      - .env